agent_type = "subagent"
display_name = "Build error resolver"
description = "Build, typecheck, lint, or TypeScript errors. Fixes only those errors with minimal diffs."
safety = "neutral"
active_model = "mistral-medium-3.5"
system_prompt_id = "build-error-resolver"
enabled_tools = ["read_file", "write_file", "search_replace", "bash", "grep", "glob", "code-memory_*"]

[tools.read_file]
permission = "always"

[tools.write_file]
permission = "ask"

[tools.search_replace]
permission = "ask"

[tools.bash]
permission = "ask"
