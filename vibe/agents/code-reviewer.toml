agent_type = "subagent"
display_name = "Code reviewer"
description = "Reviews diffs for bugs, regressions, quality, maintainability, and tests after meaningful code changes. Read-only — findings only, no patches."
safety = "safe"
active_model = "mistral-medium-3.5"
system_prompt_id = "code-reviewer"
enabled_tools = ["read_file", "grep", "glob", "bash", "code-memory_*"]

[tools.read_file]
permission = "always"

[tools.bash]
permission = "ask"
