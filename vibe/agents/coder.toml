agent_type = "subagent"
display_name = "Coder"
description = "Non-test implementation: new code, applying spec, scaffolding, porting, fixes. Pure implementation only — caller owns planning, architecture, and review."
safety = "neutral"
active_model = "mistral-medium-3.5"
system_prompt_id = "coder"
enabled_tools = ["read_file", "write_file", "search_replace", "bash", "grep", "glob", "code-memory_*"]

[tools.read_file]
permission = "always"

[tools.write_file]
permission = "ask"

[tools.search_replace]
permission = "ask"

[tools.bash]
permission = "ask"
