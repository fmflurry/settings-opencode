agent_type = "subagent"
display_name = "Database reviewer"
description = "PostgreSQL, SQL, Supabase, RLS, migrations, schema design, query performance, or DB security."
safety = "neutral"
active_model = "mistral-medium-3.5"
system_prompt_id = "database-reviewer"
enabled_tools = ["read_file", "write_file", "search_replace", "bash", "grep", "glob", "code-memory_*"]

[tools.read_file]
permission = "always"

[tools.write_file]
permission = "ask"

[tools.search_replace]
permission = "ask"

[tools.bash]
permission = "ask"
