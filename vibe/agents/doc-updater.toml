agent_type = "subagent"
display_name = "Doc updater"
description = "Documentation, README updates, architecture notes, and codemaps. Keeps docs aligned with code changes."
safety = "neutral"
active_model = "mistral-medium-3.5"
system_prompt_id = "doc-updater"
enabled_tools = ["read_file", "write_file", "search_replace", "bash", "grep", "glob", "code-memory_*"]

[tools.read_file]
permission = "always"

[tools.write_file]
permission = "ask"

[tools.search_replace]
permission = "ask"

[tools.bash]
permission = "ask"
