agent_type = "subagent"
display_name = "Dotnet Cop"
description = "Pre-merge review of HEAD vs a target branch. .NET 8 Minimal API + modular monolith focused (ports & adapters, modular isolation, EF Core, C# strictness). Runs dotnet build + dotnet format --verify-no-changes. Read-only — findings only."
safety = "safe"
active_model = "mistral-medium-3.5"
system_prompt_id = "dotnet-cop"
enabled_tools = ["read_file", "grep", "glob", "bash", "code-memory_*"]

[tools.read_file]
permission = "always"

[tools.bash]
permission = "ask"
