agent_type = "subagent"
display_name = "E2E runner"
description = "Browser automation, Playwright work, and critical user-flow E2E tests. Generates, runs, and reports artifacts."
safety = "neutral"
active_model = "mistral-medium-3.5"
system_prompt_id = "e2e-runner"
enabled_tools = ["read_file", "write_file", "search_replace", "bash", "grep", "glob", "code-memory_*"]

[tools.read_file]
permission = "always"

[tools.write_file]
permission = "ask"

[tools.search_replace]
permission = "ask"

[tools.bash]
permission = "ask"
