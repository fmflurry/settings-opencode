agent_type = "subagent"
display_name = "Refactor cleaner"
description = "Dead code, unused exports, duplication, and consolidation cleanup. Preserves behavior and verifies safety."
safety = "neutral"
active_model = "mistral-medium-3.5"
system_prompt_id = "refactor-cleaner"
enabled_tools = ["read_file", "write_file", "search_replace", "bash", "grep", "glob", "code-memory_*"]

[tools.read_file]
permission = "always"

[tools.write_file]
permission = "ask"

[tools.search_replace]
permission = "ask"

[tools.bash]
permission = "ask"
