agent_type = "subagent"
display_name = "Security reviewer"
description = "Auth, user input, API endpoints, secrets, payments, PII, or sensitive data. Read-only — reports vulnerabilities; orchestrator dispatches fixes to coder."
safety = "safe"
active_model = "mistral-medium-3.5"
system_prompt_id = "security-reviewer"
enabled_tools = ["read_file", "grep", "glob", "bash", "code-memory_*"]

[tools.read_file]
permission = "always"

[tools.bash]
permission = "ask"
