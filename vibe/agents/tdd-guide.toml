agent_type = "subagent"
display_name = "TDD guide"
description = "New features, bug fixes, or refactors needing tests. Enforces RED-GREEN-REFACTOR and 80%+ coverage. Writes test files; delegates implementation to coder via the task tool."
safety = "neutral"
active_model = "mistral-medium-3.5"
system_prompt_id = "tdd-guide"
enabled_tools = ["read_file", "write_file", "search_replace", "bash", "grep", "glob", "task", "code-memory_*"]

[tools.read_file]
permission = "always"

[tools.write_file]
permission = "ask"

[tools.search_replace]
permission = "ask"

[tools.bash]
permission = "ask"

[tools.task]
permission = "always"
